<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Gerenciar Usuários</h1>
        <p class="text-gray-500 text-sm mt-1">{{ usuarios().length }} usuário(s) cadastrado(s)</p>
      </div>
      <button (click)="abrirForm()"
        class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-sm border-0 cursor-pointer">
        <mat-icon>person_add</mat-icon>
        Novo Usuário
      </button>
    </div>

    <!-- Formulário -->
    <div *ngIf="mostrarForm()" class="bg-white rounded-2xl shadow-card border border-gray-100 p-6 mb-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-gray-900">Novo Usuário</h2>
        <button (click)="fecharForm()" class="text-gray-400 hover:text-gray-600 bg-transparent border-0 cursor-pointer p-1 rounded-lg hover:bg-gray-100">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Nome completo</mat-label>
            <input matInput formControlName="nome" placeholder="Ex: João Silva">
            <mat-error>Nome obrigatório</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" placeholder="joao@email.com">
            <mat-error>Email inválido</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Senha</mat-label>
            <input matInput formControlName="senha" type="password" placeholder="Mínimo 6 caracteres">
            <mat-error>Mínimo 6 caracteres</mat-error>
          </mat-form-field>
        </div>
        <div class="flex justify-end gap-3">
          <button type="button" (click)="fecharForm()"
            class="px-5 py-2.5 rounded-xl text-gray-700 font-medium hover:bg-gray-100 transition-colors border border-gray-200 bg-white cursor-pointer">
            Cancelar
          </button>
          <button type="submit" [disabled]="salvando() || form.invalid"
            class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-indigo-700 transition-colors disabled:opacity-50 border-0 cursor-pointer">
            <mat-icon class="text-sm">{{ salvando() ? 'hourglass_empty' : 'person_add' }}</mat-icon>
            {{ salvando() ? 'Criando...' : 'Criar Usuário' }}
          </button>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div *ngIf="loading()" class="flex justify-center py-20">
      <mat-spinner diameter="48"></mat-spinner>
    </div>

    <!-- Tabela -->
    <div *ngIf="!loading()" class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden">
      <div *ngIf="usuarios().length === 0" class="text-center py-16">
        <mat-icon class="text-gray-400 text-5xl">group</mat-icon>
        <p class="text-gray-500 mt-2">Nenhum usuário encontrado</p>
      </div>

      <table mat-table [dataSource]="usuarios()" *ngIf="usuarios().length > 0" class="w-full">

        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 px-6 py-4">Usuário</th>
          <td mat-cell *matCellDef="let u" class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                {{ u.nome.charAt(0).toUpperCase() }}
              </div>
              <div>
                <p class="font-semibold text-gray-900">{{ u.nome }}</p>
              </div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 px-6 py-4">Email</th>
          <td mat-cell *matCellDef="let u" class="px-6 py-4 text-sm text-gray-600">{{ u.email }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 px-6 py-4">Perfil</th>
          <td mat-cell *matCellDef="let u" class="px-6 py-4">
            <span [class]="u.role === 'ADMIN' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'"
              class="px-3 py-1 rounded-full text-xs font-semibold">{{ u.role }}</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas" class="border-b border-gray-100"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;" class="border-b border-gray-50 hover:bg-gray-50 transition-colors"></tr>
      </table>
    </div>
  </div>
</div>
